<!DOCTYPE html>
<html>
<head>
<title>Registro de Usuario</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="banner">
    <h1>Registro de Usuario</h1>
</div>

<div class="form-container">

<form id="miFormulario">

<div>
<label>Nombre Completo:</label>
<input type="text">
</div>

<div>
<label>Fecha de Nacimiento:</label>
<input type="date">
</div>

<div>
<label>Teléfono:</label>
<input type="tel">
</div>

<div>
<label>Correo Electrónico:</label>
<input type="email">
</div>

<div>
<label>¿Cuáles son tus intereses?</label>
<div class="checkbox-group">
<label><input type="checkbox"> Informática</label>
<label><input type="checkbox"> Música</label>
<label><input type="checkbox"> Arte Gráfico</label>
<label><input type="checkbox"> Televisión</label>
</div>
</div>

<div>
<label>Experiencia Laboral:</label>
<textarea rows="4"></textarea>
</div>

<button type="submit">Registrarse</button>

</form>
</div>

<script src="formulario.js"></script>

</body>
</html>
